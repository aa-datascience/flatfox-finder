name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (TypeScript + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # Gate on high/critical advisories, skipping dev-only ones and the known
      # Next.js advisories (see app/audit-ci.jsonc for the tracked allowlist).
      - run: npx audit-ci --config ./audit-ci.jsonc

  worker:
    name: Worker (pytest + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studenthousing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studenthousing

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt pip-audit

      # Bootstrap the DB schema so integration tests can connect.
      - name: Apply DB migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d studenthousing \
            -f ../shared/init/01-extensions.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d studenthousing \
            -f ../shared/migrations/20260604210810_init.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d studenthousing \
            -f ../shared/migrations/20260606120000_add_message_language.sql

      - run: python -m pytest -q
      - run: pip-audit
